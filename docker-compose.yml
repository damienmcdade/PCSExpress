services:
  # === EXPRESS BACKEND ===
  # Runs on port 3001 (only accessible via Docker network in production)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pcs-express-app
    environment:
      NODE_ENV: production
      PORT: 3001
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ALLOWED_ORIGIN: http://localhost
    # IMPORTANT: Only expose to Docker network, NOT to host
    expose:
      - "3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "-4", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - pcs-network
    volumes:
      - pcs-dist:/app/dist
    labels:
      service: "pcs-express-backend"
      port: "3001"

  # === NGINX REVERSE PROXY ===
  # Runs on ports 80/443 (public facing)
  # Proxies /api/* requests to Express :3001 via Docker network
  nginx:
    image: nginx:alpine
    container_name: pcs-express-web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - pcs-dist:/usr/share/nginx/html:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "-4", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - pcs-network
    labels:
      service: "pcs-express-nginx"
      ports: "80/443"

networks:
  pcs-network:
    driver: bridge

volumes:
  pcs-dist:
