# PCS Express — Netlify deployment config
# For serverless deployment on Netlify

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Redirect all routes to index.html for React Router (if added later)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# If using Netlify Functions for the API proxy
# [functions]
#   directory = "netlify/functions"
