<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14255E"/>
      <stop offset="100%" stop-color="#0A1530"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="14" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="10" cy="10" r="1"   fill="white" opacity=".7"/>
  <circle cx="28" cy="7"  r="1"   fill="white" opacity=".6"/>
  <circle cx="55" cy="9"  r="1"   fill="white" opacity=".8"/>
  <circle cx="78" cy="6"  r="1"   fill="white" opacity=".5"/>
  <circle cx="90" cy="12" r="1"   fill="white" opacity=".7"/>
  <circle cx="18" cy="18" r="1"   fill="white" opacity=".5"/>
  <circle cx="68" cy="16" r="1"   fill="white" opacity=".6"/>

  <!-- Ground -->
  <rect x="0" y="70" width="100" height="30" fill="#0C2A0C"/>

  <!-- House body -->
  <rect x="28" y="38" width="44" height="34" fill="#FBF5DC"/>
  <!-- Roof -->
  <polygon points="50,14 22,40 78,40" fill="#6E3210"/>
  <!-- Chimney -->
  <rect x="60" y="17" width="8" height="16" fill="#6E3210"/>
  <!-- Door -->
  <rect x="45" y="55" width="10" height="17" fill="#4A2A08"/>
  <!-- Windows -->
  <rect x="31" y="43" width="10" height="10" fill="#87C8EB"/>
  <line x1="36" y1="43" x2="36" y2="53" stroke="#FBF5DC" stroke-width="1.2"/>
  <line x1="31" y1="48" x2="41" y2="48" stroke="#FBF5DC" stroke-width="1.2"/>
  <rect x="59" y="43" width="10" height="10" fill="#87C8EB"/>
  <line x1="64" y1="43" x2="64" y2="53" stroke="#FBF5DC" stroke-width="1.2"/>
  <line x1="59" y1="48" x2="69" y2="48" stroke="#FBF5DC" stroke-width="1.2"/>

  <!-- SOLD sign post + board -->
  <rect x="76" y="52" width="2"  height="18" fill="#7A4A1A"/>
  <rect x="72" y="47" width="14" height="10" fill="white"/>
  <rect x="73" y="48" width="12" height="8" fill="none" stroke="#D41A1A" stroke-width="1"/>
  <text x="79" y="55" text-anchor="middle" font-size="5.5"
        font-family="Arial,Helvetica,sans-serif" font-weight="bold" fill="#D41A1A">SOLD</text>

  <!-- Moving boxes left -->
  <rect x="7"  y="59" width="15" height="12" fill="#C09430"/>
  <line x1="7"  y1="65" x2="22" y2="65" stroke="#8A6818" stroke-width="1"/>
  <rect x="10" y="49" width="12" height="11" fill="#C09430"/>
  <line x1="10" y1="54.5" x2="22" y2="54.5" stroke="#8A6818" stroke-width="1"/>

  <!-- Service member (cap + body silhouette) -->
  <ellipse cx="36" cy="54"   rx="4"   ry="4"   fill="white"/>
  <rect    x="32"  y="50"    width="8" height="3" fill="white"/>
  <rect    x="30"  y="53"    width="12" height="2.5" fill="white"/>
  <polygon points="34,58 38,58 39,68 33,68" fill="white"/>
  <rect x="30" y="58" width="2.8" height="7" fill="white"/>
  <rect x="39" y="58" width="2.8" height="7" fill="white"/>

  <!-- Spouse -->
  <ellipse cx="48" cy="55"   rx="3.5" ry="3.5" fill="white"/>
  <polygon points="45.5,58.5 50.5,58.5 51.5,67 44.5,67" fill="white"/>
  <rect x="43" y="59" width="2.5" height="6" fill="white"/>
  <rect x="51" y="59" width="2.5" height="6" fill="white"/>

  <!-- Child -->
  <ellipse cx="57.5" cy="58.5" rx="2.8" ry="2.8" fill="white"/>
  <polygon points="55,61.5 60,61.5 60.5,67 54.5,67" fill="white"/>
  <rect x="53.5" y="62" width="2"   height="5" fill="white"/>
  <rect x="60"   y="62" width="2"   height="5" fill="white"/>

  <!-- Hands held -->
  <rect x="40"   y="62.5" width="5" height="1.8" fill="white"/>
  <rect x="53"   y="64"   width="3" height="1.8" fill="white"/>

  <!-- Label band -->
  <rect x="0" y="84" width="100" height="16" fill="#050A18"/>
  <text x="50" y="94.5" text-anchor="middle" font-size="7"
        font-family="Arial,Helvetica,sans-serif" font-weight="bold"
        letter-spacing="1" fill="#C39830">PCS EXPRESS</text>
</svg>
