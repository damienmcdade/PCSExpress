<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:#1a3a5c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2240;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="suitGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60A0C8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3A7A9E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A5A7E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.4" />
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bgGrad)"/>
  
  <!-- Document/Map shape -->
  <rect x="180" y="140" width="664" height="744" rx="40" fill="url(#suitGrad)" opacity="0.95"/>
  
  <!-- Shine effect on document -->
  <rect x="180" y="140" width="664" height="200" rx="40" fill="url(#shineGrad)" opacity="0.6"/>
  
  <!-- Military compass insignia at top -->
  <g transform="translate(512, 280)">
    <circle cx="0" cy="0" r="60" fill="none" stroke="#C8A84B" stroke-width="3" opacity="0.8"/>
    <circle cx="0" cy="0" r="48" fill="none" stroke="#C8A84B" stroke-width="1.5" opacity="0.4"/>
    <polygon points="0,-15 3.5,-4.5 15,-1.5 5,6 8,18 0,12 -8,18 -5,6 -15,-1.5 -3.5,-4.5" fill="#C8A84B" opacity="0.95"/>
  </g>
  
  <!-- Checklist items -->
  <g transform="translate(240, 380)">
    <circle cx="15" cy="15" r="12" fill="none" stroke="#60A0C8" stroke-width="2.5"/>
    <path d="M 8,15 L 12,19 L 22,9" stroke="#60A0C8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="35" y1="15" x2="280" y2="15" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
    
    <circle cx="15" cy="70" r="12" fill="none" stroke="#60A0C8" stroke-width="2.5" opacity="0.7"/>
    <line x1="35" y1="70" x2="280" y2="70" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
    
    <circle cx="15" cy="125" r="12" fill="none" stroke="#60A0C8" stroke-width="2.5" opacity="0.5"/>
    <line x1="35" y1="125" x2="220" y2="125" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>
  </g>
  
  <!-- Progress bar -->
  <g transform="translate(240, 560)">
    <rect x="0" y="0" width="530" height="20" rx="10" fill="rgba(255,255,255,0.1)" stroke="#60A0C8" stroke-width="1.5" opacity="0.5"/>
    <rect x="0" y="0" width="370" height="20" rx="10" fill="#60A0C8" opacity="0.8"/>
  </g>
  
  <!-- Map route indicators -->
  <g opacity="0.6">
    <circle cx="300" cy="680" r="8" fill="#FF6B6B" opacity="0.8"/>
    <circle cx="300" cy="680" r="3" fill="#FFFFFF"/>
    
    <path d="M 320,680 L 540,660" stroke="#C8A84B" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M 540,660 L 535,655 M 540,660 L 545,650" stroke="#C8A84B" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <circle cx="560" cy="650" r="8" fill="#4ECB71" opacity="0.8"/>
    <circle cx="560" cy="650" r="3" fill="#FFFFFF"/>
  </g>
  
  <!-- Border highlight -->
  <rect x="180" y="140" width="664" height="744" rx="40" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.2"/>
</svg>
