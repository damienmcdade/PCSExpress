upstream express_backend {
    server app:3001;
}

# Fingerprint reduction — drop the nginx version from response headers
# (DISA Web Server STIG: WGSU-AS-000080 equivalent).
server_tokens off;

# Per-IP rate limit zone — protects /api endpoints against credential-
# stuffing / DoS bursts. Aligned with NIST SP 800-53 SC-5 (DoS protection).
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 10k;

    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;

    # ─── Security headers (DoD STIG-aligned / NIST SP 800-53 SC controls) ──
    # CSP: strict default-src 'self'; only scripts from self, only the
    # nominatim/OSRM/OSM-tile hosts in connect-src. Same as before.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://nominatim.openstreetmap.org https://router.project-osrm.org https://*.tile.openstreetmap.org; frame-src 'self' blob: data:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Tighter than before — now also disables sensors that could be used
    # for keystroke inference / device fingerprinting.
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=(), gyroscope=(), accelerometer=(), magnetometer=(), ambient-light-sensor=(), serial=(), midi=(), interest-cohort=()" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    # HSTS — STIG APSC-DV-001650 equivalent. 1-year max-age, includeSubDomains,
    # eligible for the preload list.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    # Spectre-class mitigations (NIST SP 800-53 SC-39 process isolation).
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    # Disable DNS prefetching — prevents passive leaks of intended URLs.
    add_header X-DNS-Prefetch-Control "off" always;

    # === SECURITY.TXT (RFC 9116) ===
    location = /.well-known/security.txt {
        root /usr/share/nginx/html;
        access_log off;
        add_header Content-Type "text/plain; charset=utf-8";
    }

    # === HEALTH CHECK ===
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # === API PROXY (MUST BE FIRST) ===
    location ~ ^/api(/.*)?$ {
        # Apply the rate limit defined above. burst=10 lets short
        # legitimate bursts through; nodelay rejects beyond the burst
        # immediately rather than queueing.
        limit_req zone=api_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://express_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;

        # Strip the backend's Server header so internal stack details
        # don't leak through the proxy (STIG WGSU-AS-000080).
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    # === STATIC FILES ===
    location ~ \.(js|png|jpg|jpeg|gif|ico|svg|css|woff|woff2|ttf|eot|manifest|json)$ {
        root /usr/share/nginx/html;
        access_log off;
    }

    # === STATIC FRONTEND (FALLBACK FOR SPA) ===
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
