upstream express_backend {
    server app:3001;
}

server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 10k;

    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;

    # === HEALTH CHECK ===
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # === API PROXY (MUST BE FIRST) ===
    location ~ ^/api(/.*)?$ {
        proxy_pass http://express_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
    }

    # === DENY SENSITIVE FILES ===
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # === ASSET CACHING (BEFORE SPA FALLBACK) ===
    location ^~ /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Serve bundle assets correctly if a refreshed nested SPA route requests
    # ./assets/... relative to the route path.
    location ~ ^/.+/assets/(.+)$ {
        alias /usr/share/nginx/html/assets/$1;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # === STATIC FILES ===
    location ~ \.(png|jpg|jpeg|gif|ico|svg|css|woff|woff2|ttf|eot|manifest|json)$ {
        root /usr/share/nginx/html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        access_log off;
    }

    # === STATIC FRONTEND (FALLBACK FOR SPA) ===
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        expires off;
        add_header Cache-Control "no-store";
        add_header Vary "Accept-Encoding";
    }
}
