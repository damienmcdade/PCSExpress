upstream express_backend {
    server app:3001;
}

server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 10k;

    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://nominatim.openstreetmap.org https://router.project-osrm.org https://*.tile.openstreetmap.org; frame-src 'self' blob: data:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=()" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # === HEALTH CHECK ===
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # === API PROXY (MUST BE FIRST) ===
    location ~ ^/api(/.*)?$ {
        proxy_pass http://express_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
    }

    # === STATIC FILES ===
    location ~ \.(js|png|jpg|jpeg|gif|ico|svg|css|woff|woff2|ttf|eot|manifest|json)$ {
        root /usr/share/nginx/html;
        access_log off;
    }

    # === STATIC FRONTEND (FALLBACK FOR SPA) ===
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
