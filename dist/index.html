    <title>PCS Express</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; overflow: hidden; background: #0A1628; }
      #root { height: 100%; overflow: auto; }
      body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; }
    </style>
    <script>
      // Catch JS errors and display them visually in the app (useful for diagnosing WKWebView failures)
      window.__showError = function(msg) {
        var el = document.getElementById('root');
        if (el) el.innerHTML = '<div style="position:fixed;inset:0;background:#0A1628;color:#ff9999;padding:24px;font-family:monospace;font-size:13px;overflow:auto;white-space:pre-wrap;z-index:9999"><b style="font-size:15px;color:#ff6b6b">App Error</b>\n\n' + msg + '</div>';
      };
      window.onerror = function(msg, src, line, col, err) {
        window.__showError((err && err.stack) || (msg + '\n' + src + ':' + line + ':' + col));
        return false;
      };
      window.addEventListener('unhandledrejection', function(e) {
        window.__showError('Unhandled Promise Rejection:\n' + ((e.reason && e.reason.stack) || String(e.reason)));
      });
    </script>
    
  </head>
  <body>
    <div id="root"></div>
    <script src="./assets/index-CPSJ1DOk.js"></script>
</body>
