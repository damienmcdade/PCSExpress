# GitHub Actions CI/CD for PCS Express
# Builds Docker image and pushes to registry on every push to main

name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./pcs-express
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pcs-express:latest
            ${{ secrets.DOCKER_USERNAME }}/pcs-express:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/pcs-express:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/pcs-express:buildcache,mode=max
      
      - name: Test image
        if: github.event_name == 'pull_request'
        run: |
          docker build ./pcs-express -t pcs-express:test
          docker run -d --name test -e ANTHROPIC_API_KEY=test -e NODE_ENV=production pcs-express:test
          sleep 5
          docker logs test
          docker exec test wget -q -O- http://localhost:3001/api/health || exit 1
