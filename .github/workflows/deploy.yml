# GitHub Actions CI/CD for PCS Express
# Builds Docker image and pushes to registry on every push to main

name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      
      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test (unit + component)
        run: npm test

      - name: Build
        run: npm run build
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca  # v3
      
      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      # Up to 3 attempts on the docker build/push step. docker/build-push-action
      # itself does not retry on transient registry errors (5xx from ghcr.io,
      # DNS hiccups during `docker push`), so we use action retries.
      # Real build failures (Dockerfile errors, test failures) are
      # deterministic and will fail every attempt the same way — they still
      # surface to CI normally, just three times.
      - name: Build and push (attempt 1/3)
        id: build_push_1
        continue-on-error: true
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v5
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/damienmcdade/pcs-express:latest
            ghcr.io/damienmcdade/pcs-express:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Wait before retry 2
        if: steps.build_push_1.outcome == 'failure'
        run: sleep 30

      - name: Build and push (attempt 2/3)
        if: steps.build_push_1.outcome == 'failure'
        id: build_push_2
        continue-on-error: true
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v5
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/damienmcdade/pcs-express:latest
            ghcr.io/damienmcdade/pcs-express:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Wait before retry 3
        if: steps.build_push_1.outcome == 'failure' && steps.build_push_2.outcome == 'failure'
        run: sleep 60

      - name: Build and push (attempt 3/3)
        if: steps.build_push_1.outcome == 'failure' && steps.build_push_2.outcome == 'failure'
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v5
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/damienmcdade/pcs-express:latest
            ghcr.io/damienmcdade/pcs-express:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Test image
        if: github.event_name == 'pull_request'
        run: |
          docker build . -t pcs-express:test
          docker run -d --name test \
            -e ANTHROPIC_API_KEY=sk-ant-test \
            -e NODE_ENV=production \
            -p 3001:3001 \
            pcs-express:test
          # Poll the health endpoint with a timeout instead of a fixed sleep
          # that races the server's ~5s startup. Use curl (explicitly
          # installed in the Dockerfile) against /health — the same tool and
          # path the image's own HEALTHCHECK uses — rather than wget, which
          # isn't guaranteed in the runtime image.
          ok=0
          for i in $(seq 1 30); do
            if docker exec test curl -fsS http://127.0.0.1:3001/health >/dev/null 2>&1; then
              ok=1
              echo "✓ /health responded after ~${i}s"
              break
            fi
            sleep 1
          done
          docker logs test || true
          if [ "$ok" != "1" ]; then
            echo "::error::Container health check never passed within 30s."
            docker stop test; docker rm test
            exit 1
          fi
          docker stop test
          docker rm test
      
      - name: Notify deployment
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "✓ Docker image built and pushed: ghcr.io/damienmcdade/pcs-express:latest"
          echo "✓ Build hash: ${{ github.sha }}"
