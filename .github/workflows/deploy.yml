# GitHub Actions CI/CD for PCS Express
# Builds Docker image and pushes to registry on every push to main

name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint & test
        run: npm run build
        working-directory: ./pcs-express
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./pcs-express
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pcs-express:latest
            ${{ secrets.DOCKER_USERNAME }}/pcs-express:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/pcs-express:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/pcs-express:buildcache,mode=max
      
      - name: Test image
        if: github.event_name == 'pull_request'
        run: |
          docker build ./pcs-express -t pcs-express:test
          docker run -d --name test \
            -e ANTHROPIC_API_KEY=sk-ant-test \
            -e NODE_ENV=production \
            -p 3001:3001 \
            pcs-express:test
          sleep 5
          docker logs test || true
          docker exec test wget -q -O- http://localhost:3001/api/health || exit 1
          docker stop test
          docker rm test
      
      - name: Notify deployment
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "✓ Docker image built and pushed: ${{ secrets.DOCKER_USERNAME }}/pcs-express:latest"
          echo "✓ Build hash: ${{ github.sha }}"
