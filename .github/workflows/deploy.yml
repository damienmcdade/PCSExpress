# GitHub Actions CI/CD for PCS Express
# Builds Docker image and pushes to registry on every push to main

name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      # Up to 3 attempts on the docker build/push step. docker/build-push-action
      # itself does not retry on transient registry errors (5xx from ghcr.io,
      # DNS hiccups during `docker push`), so we use action retries.
      # Real build failures (Dockerfile errors, test failures) are
      # deterministic and will fail every attempt the same way — they still
      # surface to CI normally, just three times.
      - name: Build and push (attempt 1/3)
        id: build_push_1
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/damienmcdade/pcs-express:latest
            ghcr.io/damienmcdade/pcs-express:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/damienmcdade/pcs-express:buildcache
          cache-to: type=registry,ref=ghcr.io/damienmcdade/pcs-express:buildcache,mode=max

      - name: Wait before retry 2
        if: steps.build_push_1.outcome == 'failure'
        run: sleep 30

      - name: Build and push (attempt 2/3)
        if: steps.build_push_1.outcome == 'failure'
        id: build_push_2
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/damienmcdade/pcs-express:latest
            ghcr.io/damienmcdade/pcs-express:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/damienmcdade/pcs-express:buildcache
          cache-to: type=registry,ref=ghcr.io/damienmcdade/pcs-express:buildcache,mode=max

      - name: Wait before retry 3
        if: steps.build_push_1.outcome == 'failure' && steps.build_push_2.outcome == 'failure'
        run: sleep 60

      - name: Build and push (attempt 3/3)
        if: steps.build_push_1.outcome == 'failure' && steps.build_push_2.outcome == 'failure'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/damienmcdade/pcs-express:latest
            ghcr.io/damienmcdade/pcs-express:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/damienmcdade/pcs-express:buildcache
          cache-to: type=registry,ref=ghcr.io/damienmcdade/pcs-express:buildcache,mode=max
      
      - name: Test image
        if: github.event_name == 'pull_request'
        run: |
          docker build . -t pcs-express:test
          docker run -d --name test \
            -e ANTHROPIC_API_KEY=sk-ant-test \
            -e NODE_ENV=production \
            -p 3001:3001 \
            pcs-express:test
          sleep 5
          docker logs test || true
          docker exec test wget -q -O- http://localhost:3001/api/health || exit 1
          docker stop test
          docker rm test
      
      - name: Notify deployment
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "✓ Docker image built and pushed: ghcr.io/damienmcdade/pcs-express:latest"
          echo "✓ Build hash: ${{ github.sha }}"
