# Synchronous frontend (Vercel) + backend (Railway) production deploy.
#
# Runs on every push to main. Vercel and Railway deploy in PARALLEL
# jobs so the two surfaces don't drift in time — the frontend that
# users hit and the backend it calls are released within seconds of
# each other.
#
# Required GitHub repo secrets (set in Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN        — Vercel personal token (Account Settings → Tokens)
#   VERCEL_ORG_ID       — `vercel link` then read .vercel/project.json
#   VERCEL_PROJECT_ID   — same file
#   RAILWAY_TOKEN       — Railway project token (Project Settings → Tokens)
#
# If the tokens are NOT configured, the deploy jobs SKIP (the workflow stays
# green) rather than failing — deploys can still be run manually with
# `npm run deploy:vercel` / `npm run deploy:railway`. The jobs auto-activate
# as soon as the secrets are added.
#
# Build / test / docker is still handled by deploy.yml; this workflow
# only owns the platform deploys themselves.

name: Release (Vercel + Railway)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  check-secrets:
    name: Check deploy credentials
    runs-on: ubuntu-latest
    outputs:
      has_vercel: ${{ steps.check.outputs.has_vercel }}
      has_railway: ${{ steps.check.outputs.has_railway }}
    steps:
      - id: check
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "has_vercel=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_vercel=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Vercel deploy skipped — VERCEL_TOKEN/ORG_ID/PROJECT_ID not configured. Deploy manually with 'npm run deploy:vercel'."
          fi
          if [ -n "$RAILWAY_TOKEN" ]; then
            echo "has_railway=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_railway=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Railway deploy skipped — RAILWAY_TOKEN not configured. Deploy manually with 'npm run deploy:railway'."
          fi

  vercel:
    name: Vercel (frontend)
    needs: check-secrets
    if: needs.check-secrets.outputs.has_vercel == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project info
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production

      - name: Build (Vercel)
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod

      - name: Deploy to Vercel (prod)
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prebuilt --prod

  railway:
    name: Railway (backend)
    needs: check-secrets
    if: needs.check-secrets.outputs.has_railway == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service PCSExpress --ci

  notify:
    name: Confirm both deploys landed
    runs-on: ubuntu-latest
    needs: [check-secrets, vercel, railway]
    if: always()
    steps:
      - name: Summarize
        env:
          VERCEL_RESULT: ${{ needs.vercel.result }}
          RAILWAY_RESULT: ${{ needs.railway.result }}
        run: |
          echo "Vercel result:  $VERCEL_RESULT"
          echo "Railway result: $RAILWAY_RESULT"
          # 'skipped' means the secret isn't configured — deploy happens via
          # the manual CLI path, so that's acceptable, not a failure.
          fail=0
          if [ "$VERCEL_RESULT" != "success" ] && [ "$VERCEL_RESULT" != "skipped" ]; then fail=1; fi
          if [ "$RAILWAY_RESULT" != "success" ] && [ "$RAILWAY_RESULT" != "skipped" ]; then fail=1; fi
          if [ "$fail" = "1" ]; then
            echo "::error::A configured deploy failed — Vercel and Railway must both succeed (or be skipped) to stay in sync."
            exit 1
          fi
          if [ "$VERCEL_RESULT" = "skipped" ] || [ "$RAILWAY_RESULT" = "skipped" ]; then
            echo "✓ No drift: a deploy was skipped (credentials not configured); use the manual CLI deploy."
          else
            echo "✓ Frontend (Vercel) and backend (Railway) deployed in sync."
          fi
