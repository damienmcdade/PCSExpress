# Custom CodeQL workflow — JavaScript + Java/Kotlin + Swift.
#
# Why a custom config:
#   GitHub's "default setup" CodeQL autobuild detected Swift in ios/ and
#   Java in android/, then tried to autobuild via `xcodebuild` and
#   `gradle` on a fresh checkout. That fails because:
#     - Capacitor iOS needs `npm run build` + `npx cap sync ios` so the
#       web payload (ios/App/App/public/) exists before xcodebuild runs.
#     - Android Gradle needs the same web payload at
#       android/app/src/main/assets/public/ for resource compilation.
#
# This custom workflow runs the required prep steps before invoking
# CodeQL's build/analysis phases for each language, so:
#   - JavaScript: scanned directly (no build needed).
#   - Java/Kotlin: gradle assembleDebug after cap sync, so generated
#     sources (R.java, BuildConfig.java) and dependency JARs are
#     available for CodeQL's type resolver.
#   - Swift: xcodebuild after cap sync ios, with SPM resolution.
#
# IMPORTANT: After committing this workflow, disable the conflicting
# "Default setup" in:
#   Repo → Settings → Code security and analysis → Code scanning →
#   "Default setup" → ⚙️ Configure → Disable / switch to "Advanced".
# Otherwise the default setup keeps firing and overrides this file.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan to catch newly-disclosed CVEs in dependencies.
    - cron: '23 11 * * 3'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze-js:
    name: Analyze (javascript)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript'

  analyze-actions:
    name: Analyze (actions)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: actions
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:actions'

  analyze-java:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        # Capacitor 8 CLI requires Node >= 22.
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install JS dependencies
        run: npm ci

      - name: Build web payload (vite)
        run: npm run build

      - name: Capacitor sync (android)
        run: npx cap sync android

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          queries: security-extended
          build-mode: manual

      - name: Build Android (Gradle)
        # assembleDebug produces compiled classes + dependency JARs that
        # CodeQL needs for accurate call-target and known-type analysis.
        # Skipping signing keeps the CI runner unauthenticated.
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --console=plain

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:java-kotlin'

  analyze-swift:
    name: Analyze (swift)
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        # Capacitor 8 CLI requires Node >= 22.
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Build web payload (vite)
        run: npm run build

      - name: Capacitor sync (ios)
        run: npx cap sync ios

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift
          queries: security-extended
          build-mode: manual

      - name: Resolve Swift Package dependencies
        run: |
          cd ios/App
          xcodebuild \
            -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme App

      - name: Build iOS (xcodebuild)
        # -scheme App is required for Capacitor 8 (SPM-based). Skip
        # signing entirely — CI does not have provisioning profiles
        # and we only need a compile for static analysis.
        run: |
          cd ios/App
          xcodebuild \
            build \
            -project App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:swift'
