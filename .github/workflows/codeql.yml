# Custom CodeQL workflow — JavaScript-only.
#
# Why a custom config:
#   GitHub's "default setup" CodeQL detected Swift in ios/ and tried to
#   autobuild via `xcodebuild`. The Capacitor iOS project is a thin
#   native shell — all real application logic lives in the JavaScript
#   bundle. Autobuilding Swift also fails on a fresh checkout because
#   the iOS project's web payload directory (ios/App/App/public/) is
#   gitignored and regenerated by `cap sync ios` after `npm run build`,
#   which CodeQL autobuild doesn't run.
#
# So we tell CodeQL to scan JavaScript (where the actual logic and
# attack surface lives) and skip Swift. The bundled JavaScript that
# Capacitor wraps gets the same security review as the web build.
#
# IMPORTANT: After committing this workflow, disable the conflicting
# "Default setup" in:
#   Repo → Settings → Code security and analysis → Code scanning →
#   "Default setup" → ⚙️ Configure → Disable / switch to "Advanced".
# Otherwise the default setup keeps firing and overrides this file.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan to catch newly-disclosed CVEs in dependencies.
    - cron: '23 11 * * 3'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        # NOTE: Add 'typescript' here if we ever introduce TS source files.
        # NOTE: Add 'swift' (on macos-latest) only after we wire a manual
        # build step that does: npm ci && npm run build && npx cap sync ios.
        language: ['javascript']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Use the security-extended pack to catch more issues than the
          # default query suite, but stop short of security-and-quality
          # which adds many maintainability lints that aren't security.
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
